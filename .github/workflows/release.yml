name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          name: Omega Drive ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-core:
    needs: [create-release]
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .msi
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: .AppImage
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: .dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: .dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - name: Create stub external binaries
        shell: bash
        run: |
          host=$(rustc -vV | grep host | cut -d' ' -f2)
          [[ "$host" == *"-windows-"* ]] && ext=".exe" || ext=""
          mkdir -p src-tauri/binaries
          for bin in ffmpeg ffprobe yt-dlp deno; do touch "src-tauri/binaries/$bin-$host$ext"; done
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential
      - run: npm --prefix ui ci
      - run: npm --prefix ui run build
      - run: npx @tauri-apps/cli build --target ${{ matrix.target }} --config src-tauri/crates/tauri_app/tauri.conf.json
      - name: Upload app installer
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: target/${{ matrix.target }}/release/Omega-Drive${{ matrix.ext }}
          asset_name: Omega-Drive-${{ matrix.target }}${{ matrix.ext }}
          asset_content_type: application/octet-stream

  build-binary-archive:
    needs: [create-release]
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: .zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: .tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: .tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: .tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Create binary archive
        shell: bash
        run: |
          mkdir -p dist/binaries
          cp src-tauri/binaries/* dist/binaries/ 2>/dev/null || true
          cd dist
          if [[ "${{ matrix.archive_ext }}" == ".zip" ]]; then
            7z a "binaries-${{ matrix.target }}${{ matrix.archive_ext }}" binaries/
          else
            tar czf "binaries-${{ matrix.target }}${{ matrix.archive_ext }}" binaries/
          fi
      - name: Upload binary archive
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/binaries-${{ matrix.target }}${{ matrix.archive_ext }}
          asset_name: binaries-${{ matrix.target }}${{ matrix.archive_ext }}
          asset_content_type: application/octet-stream
