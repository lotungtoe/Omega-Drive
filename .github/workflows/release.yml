name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v5
      - name: Create Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          name: Omega Drive ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-core:
    needs: [create-release]
    env:
      CARGO_INCREMENTAL: 1
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: .AppImage
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: .dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: .dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential
      - name: Build frontend & Rust (parallel)
        shell: pwsh
        run: |
          $job = Start-Job -Name "Rust" -ScriptBlock { param($t) cargo build --release --target $t --manifest-path src-tauri/crates/tauri_app/Cargo.toml } -ArgumentList "${{ matrix.target }}"
          npm --prefix ui ci
          npm --prefix ui run build
          Receive-Job -Name "Rust" -Wait
      - name: Bundle installer
        run: npx @tauri-apps/cli build --target ${{ matrix.target }} --config src-tauri/crates/tauri_app/tauri.conf.json
      - name: Upload app installer
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: target/${{ matrix.target }}/release/Omega-Drive${{ matrix.ext }}
          asset_name: Omega-Drive-${{ matrix.target }}${{ matrix.ext }}
          asset_content_type: application/octet-stream


