name: Build Setup

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1
  RUSTFLAGS: ""

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - run: npm --prefix ui ci
      - run: npm --prefix ui run build
      - uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: ui/dist/

  build:
    needs: frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: ui/dist/
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: Swatinem/rust-cache@v2
      - name: Download mpv DLLs
        shell: pwsh
        run: |
          $dir = "src-tauri/crates/tauri_app"
          curl -sL -o "$dir/mpv.dll" "https://github.com/lotungtoe/Omega-Drive/releases/download/deps-v1/mpv.dll"
          curl -sL -o "$dir/libmpv-2.dll" "https://github.com/lotungtoe/Omega-Drive/releases/download/deps-v1/libmpv-2.dll"
          Copy-Item "$dir/mpv.dll" "$dir/mpv-1.dll"
      - run: npx @tauri-apps/cli build --target x86_64-pc-windows-msvc --config src-tauri/crates/tauri_app/tauri.conf.json
      - uses: actions/upload-artifact@v5
        with:
          name: Omega-Drive-x86_64-pc-windows-msvc
          path: target/x86_64-pc-windows-msvc/release/bundle/**/*
