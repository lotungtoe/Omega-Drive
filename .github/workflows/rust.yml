name: Build Setup

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1
  RUSTFLAGS: ""

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # - os: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential
      - name: Download mpv DLLs
        shell: pwsh
        run: |
          $dir = "src-tauri/crates/tauri_app"
          curl -sL -o "$dir/mpv.dll" "https://github.com/lotungtoe/Omega-Drive/releases/download/deps-v1/mpv.dll"
          curl -sL -o "$dir/libmpv-2.dll" "https://github.com/lotungtoe/Omega-Drive/releases/download/deps-v1/libmpv-2.dll"
          Copy-Item "$dir/mpv.dll" "$dir/mpv-1.dll"
      - run: npm --prefix ui ci
      - run: npm --prefix ui run build
      - run: npx @tauri-apps/cli build --target ${{ matrix.target }} --config src-tauri/crates/tauri_app/tauri.conf.json
      - uses: actions/upload-artifact@v5
        with:
          name: Omega-Drive-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/bundle/**/*
