name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Create stub external binaries
      run: |
        host=$(rustc -vV | grep host | cut -d' ' -f2); mkdir -p src-tauri/binaries
        for bin in ffmpeg ffprobe yt-dlp deno; do touch "src-tauri/binaries/$bin-$host"; done
    - name: Install system dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libglib2.0-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libssl-dev \
          libxdo-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev \
          build-essential
    - name: Build
      run: cargo build --workspace --verbose
    - name: Run tests
      run: cargo test --workspace --verbose
